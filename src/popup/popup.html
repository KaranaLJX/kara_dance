<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caradance 扒舞助手</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1>Caradance 扒舞助手</h1>
      <p id="tab-info">正在读取当前标签页...</p>

      <section class="card">
        <div class="row">
          <span>页面</span>
          <strong id="page-status">检测中</strong>
        </div>
        <div class="row">
          <span>视频</span>
          <strong id="video-status">检测中</strong>
        </div>
        <div class="row">
          <span>时间</span>
          <strong id="time-status">--:--</strong>
        </div>
        <div class="row">
          <span>倍速</span>
          <strong id="rate-status">x1.0</strong>
        </div>
        <div class="row">
          <span>打点数</span>
          <strong id="marker-count">0</strong>
        </div>
        <div class="row">
          <span>A 点</span>
          <strong id="ab-start-status">未设置</strong>
        </div>
        <div class="row">
          <span>B 点</span>
          <strong id="ab-end-status">未设置</strong>
        </div>
      </section>

      <section class="grid">
        <button type="button" data-action="toggle-play">播放 / 暂停</button>
        <button type="button" data-action="add-marker">记录打点</button>
        <button type="button" data-action="jump-previous">上一个点</button>
        <button type="button" data-action="jump-next">下一个点</button>
        <button type="button" data-action="slower">减速</button>
        <button type="button" data-action="faster">加速</button>
        <button type="button" data-action="set-ab-start">设置 A 点</button>
        <button type="button" data-action="set-ab-end">设置 B 点</button>
        <button type="button" data-action="toggle-loop">循环当前段</button>
        <button type="button" data-action="save-ab-history">保存片段</button>
        <button type="button" data-action="seek-ab-start">跳到 A 点</button>
        <button type="button" data-action="toggle-panel">显示/隐藏面板</button>
      </section>

      <section class="card">
        <div class="section-head">
          <div class="section-title">当前视频打点</div>
          <button type="button" class="mini danger" data-action="clear-markers">清空打点</button>
        </div>
        <div id="marker-list" class="marker-list">
          <p class="empty">还没有打点，先在想拆解的动作处点一下。</p>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <div class="section-title">历史片段</div>
          <div class="mini-actions">
            <button type="button" class="mini secondary" data-action="clear-ab">清空 A/B</button>
            <button type="button" class="mini danger" data-action="clear-history">清空历史</button>
          </div>
        </div>
        <div id="history-list" class="history-list">
          <p class="empty">保存过的 A/B 片段会出现在这里。</p>
        </div>
      </section>

      <button id="refresh-button" type="button" class="secondary wide">刷新状态</button>
      <p id="status">就绪</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
